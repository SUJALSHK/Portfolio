<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="All projects by Sujal Shakya, including web apps, frontend projects, games, and AI tools."
    />
    <title>All Projects | Sujal Shakya</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="../../projects-data.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Revalia&display=swap");

      :root {
        --bg-main: #0b1020;
        --bg-card: #111827;
        --accent: #38bdf8;
        --text-main: #f9fafb;
        --text-muted: #cbd5e1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #03050c;
        color: var(--text-main);
        font-family: "Poppins", sans-serif;
      }

      .display-font {
        font-family: "Revalia", cursive;
      }

      .all-projects-page {
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 0%, rgba(246, 238, 220, 0.14) 0, rgba(246, 238, 220, 0.05) 24rem, transparent 48rem),
          radial-gradient(circle at 80% 12%, rgba(56, 189, 248, 0.18) 0, rgba(56, 189, 248, 0.07) 30rem, transparent 58rem),
          radial-gradient(circle at 44% 52%, rgba(92, 111, 145, 0.16) 0, rgba(92, 111, 145, 0.06) 38rem, transparent 76rem),
          linear-gradient(180deg, #151b2c 0%, #0b1020 42%, #03050c 100%);
      }

      .fade-in {
        animation: fadeIn 0.8s ease both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .project-card {
        border: 1px solid rgba(56, 189, 248, 0.18);
        border-radius: 16px;
        overflow: hidden;
        background: rgba(17, 24, 39, 0.78);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.26);
        backdrop-filter: blur(16px);
        transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      }

      .project-card:hover,
      .project-card:focus-within {
        border-color: rgba(56, 189, 248, 0.72);
        box-shadow: 0 26px 78px rgba(56, 189, 248, 0.18), 0 28px 76px rgba(0, 0, 0, 0.34);
        transform: translateY(-6px);
      }

      .project-image-wrap {
        position: relative;
        aspect-ratio: 16 / 10;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.9);
      }

      .project-image-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 34%, rgba(3, 5, 12, 0.46));
        pointer-events: none;
      }

      .project-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.92) brightness(0.88);
        transition: filter 0.3s ease, transform 0.35s ease;
      }

      .project-card:hover .project-image,
      .project-card:focus-within .project-image {
        filter: saturate(1.04) brightness(1);
        transform: scale(1.06);
      }

      .theme-button {
        min-height: 3rem;
        border: 1px solid rgba(56, 189, 248, 0.35);
        border-radius: 0.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        background: rgba(15, 23, 42, 0.72);
        color: #ffffff;
        box-shadow: 0 18px 38px rgba(56, 189, 248, 0.12);
        font-size: 0.875rem;
        font-weight: 700;
        padding: 0.75rem 1.35rem;
        transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, transform 0.25s ease, opacity 0.25s ease;
      }

      .theme-button:hover,
      .theme-button:focus-visible {
        border-color: var(--accent);
        background: rgba(56, 189, 248, 0.1);
        box-shadow: 0 20px 44px rgba(56, 189, 248, 0.22);
        transform: translateY(-2px);
      }

      .project-card .theme-button {
        opacity: 0.88;
      }

      .project-card:hover .theme-button,
      .project-card:focus-within .theme-button {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const { createElement: h } = React;

      function imagePath(project) {
        if (/^(https?:|\/)/.test(project.image)) {
          return project.image;
        }

        return `/${project.image}`;
      }

      function linkAttributes(url) {
        return /^https?:/.test(url)
          ? { target: "_blank", rel: "noopener noreferrer" }
          : {};
      }

      function ProjectCard({ project, index }) {
        const liveUrl = project.liveUrl || "#";
        const githubUrl = project.githubUrl || "#";

        return h(
          "article",
          {
            className: "project-card fade-in flex h-full flex-col",
            style: { animationDelay: `${Math.min(index * 0.045, 0.45)}s` },
          },
          h(
            "div",
            { className: "project-image-wrap" },
            h("img", {
              className: "project-image",
              src: imagePath(project),
              alt: project.alt || `${project.title} project preview`,
            })
          ),
          h(
            "div",
            { className: "flex flex-1 flex-col p-6" },
            h(
              "p",
              { className: "text-xs font-bold uppercase tracking-[0.22em] text-sky-300" },
              project.category
            ),
            h("h2", { className: "mt-3 text-2xl font-bold text-white" }, project.title),
            h("p", { className: "mt-3 flex-1 text-sm leading-7 text-slate-300" }, project.description),
            h(
              "div",
              { className: "mt-5 flex flex-wrap gap-2" },
              project.tech.map((item) =>
                h(
                  "span",
                  {
                    key: item,
                    className:
                      "rounded-full border border-sky-300/25 bg-slate-950/50 px-3 py-1 text-xs font-semibold text-slate-200",
                  },
                  item
                )
              )
            ),
            h(
              "div",
              { className: "mt-6 grid grid-cols-1 gap-3 sm:grid-cols-2" },
              h(
                "a",
                {
                  href: liveUrl,
                  className: "theme-button",
                  "aria-label": `View ${project.title}`,
                  ...linkAttributes(liveUrl),
                },
                "View Project"
              ),
              h(
                "a",
                {
                  href: githubUrl,
                  className: "theme-button",
                  "aria-label": `Open ${project.title} on GitHub`,
                  ...linkAttributes(githubUrl),
                },
                "GitHub"
              )
            )
          )
        );
      }

      function AllProjectsPage() {
        const projects = window.portfolioProjects || [];

        return h(
          "main",
          { className: "all-projects-page" },
          h(
            "section",
            { className: "mx-auto max-w-7xl px-5 py-20 sm:px-8 lg:px-10" },
            h(
              "div",
              { className: "fade-in mx-auto max-w-4xl text-center" },
              h(
                "p",
                { className: "text-sm font-bold uppercase tracking-[0.28em] text-sky-300" },
                "Project Collection"
              ),
              h(
                "h1",
                { className: "display-font mt-5 text-4xl leading-tight text-white sm:text-5xl lg:text-6xl" },
                "All Projects"
              ),
              h(
                "p",
                { className: "mx-auto mt-5 max-w-2xl text-base leading-8 text-slate-300 sm:text-lg" },
                "A complete collection of my web apps, frontend projects, games, and AI tools."
              ),
              h(
                "div",
                { className: "mt-8 flex flex-col justify-center gap-3 sm:flex-row" },
                h(
                  "a",
                  {
                    href: "/projects",
                    className: "theme-button",
                  },
                  "Back to Project Gallery"
                ),
                h(
                  "a",
                  {
                    href: "/",
                    className: "theme-button",
                  },
                  "Back to Home"
                )
              )
            ),
            h(
              "div",
              { className: "mt-14 grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3" },
              projects.map((project, index) => h(ProjectCard, { key: project.title, project, index }))
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(AllProjectsPage));
    </script>
  </body>
</html>
